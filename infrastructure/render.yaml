# infrastructure/render.yaml
# Modified for Render Free Tier Compatibility

services:
  # 1. The Identity Provider (Auth)
  - type: web
    name: 2-auth-provider
    plan: free
    env: node
    buildCommand: cd services/2-auth-provider && npm install
    startCommand: cd services/2-auth-provider && node oauth-issuer.js

  # 2. The Python Backend (Converted to Public Web for Free Tier)
  - type: web
    name: 3-backend-api
    plan: free
    env: python
    buildCommand: cd services/3-backend-api && pip install fastapi uvicorn pydantic pyjwt
    # Render assigns a dynamic port via the $PORT variable, so we must bind to it
    startCommand: cd services/3-backend-api && python -m uvicorn app:app --host 0.0.0.0 --port $PORT

  # 3. The API Gateway (Edge Proxy)
  - type: web
    name: 1-api-gateway
    plan: free
    env: node
    buildCommand: cd services/1-api-gateway && npm install
    startCommand: cd services/1-api-gateway && node ingress-router.js

  # 4. The Frontend Dashboard (Static Site)
  - type: web
    name: 5-admin-dashboard
    env: static
    buildCommand: cd services/5-admin-dashboard && npm install && npm run build
    staticPublishPath: services/5-admin-dashboard/dist
    # We will manually add the VITE_ variables in the Render dashboard later